name: Fetch Wheels and Run Tests

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to fetch (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  fetch-wheels:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
    steps:
      - name: Download wheels from private repo release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          mkdir -p wheels

          gh release download ${{ inputs.version }} \
            --repo UnravelSports/fast-forward-rs \
            --pattern "*.whl" \
            --dir wheels/ \
            --clobber

          echo "Downloaded wheels:"
          ls -la wheels/

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheels/*.whl
          retention-days: 1

  run-tests:
    needs: fetch-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          ref: feat/separate-rust

      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheels/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pre-built wheel
        run: |
          pip install kloppy-light --find-links=wheels/ --no-index

      - name: Copy extension to Python source
        run: |
          # Find the installed extension and copy to python/kloppy_light/
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          cp -v "$SITE_PACKAGES"/kloppy_light/_kloppy_light* python/kloppy_light/ || true
        shell: bash

      - name: Install test dependencies
        run: |
          pip install pytest polars

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/python
        run: |
          pytest tests/ -v

  create-release:
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheels/

      - name: Create release with wheels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ inputs.version }} \
            wheels/*.whl \
            --repo ${{ github.repository }} \
            --title "Release ${{ inputs.version }}" \
            --generate-notes
