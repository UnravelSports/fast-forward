name: Fetch Wheels and Run Tests

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to fetch (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  fetch-wheels:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          ref: feat/separate-rust

      - name: Download wheels from private repo release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          # Create wheels directory
          mkdir -p wheels

          # Download all wheel files from the private repo release
          gh release download ${{ inputs.version }} \
            --repo UnravelSports/fast-forward-rs \
            --pattern "*.whl" \
            --dir wheels/

          echo "Downloaded wheels:"
          ls -la wheels/

      - name: Commit wheels to public repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add wheels (make sure *.whl is not in .gitignore)
          git add wheels/
          git commit -m "Add pre-built wheels for ${{ inputs.version }}" || echo "No changes to commit"
          git push

  run-tests:
    needs: fetch-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          ref: feat/separate-rust  # Get latest with wheels

      - name: Pull latest changes
        run: git pull origin feat/separate-rust

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with pre-built wheel
        run: |
          pip install . --find-links=wheels/

      - name: Install test dependencies
        run: |
          pip install pytest polars

      - name: Run tests
        run: |
          pytest tests/ -v

  create-release:
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          ref: feat/separate-rust

      - name: Pull latest changes
        run: git pull origin feat/separate-rust

      - name: Create release with wheels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ inputs.version }} \
            wheels/*.whl \
            --title "Release ${{ inputs.version }}" \
            --generate-notes
